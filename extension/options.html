<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vijia Bridge Settings</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        margin: 24px;
        color: #111827;
      }

      main {
        max-width: 680px;
      }

      label {
        display: block;
        margin: 16px 0 6px;
        font-weight: 600;
      }

      input {
        width: 100%;
        padding: 10px 12px;
        font: inherit;
        box-sizing: border-box;
      }

      button {
        margin-top: 20px;
        padding: 10px 16px;
        font: inherit;
        cursor: pointer;
      }

      #status {
        margin-top: 16px;
        color: #065f46;
      }

      code {
        background: #f3f4f6;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Vijia Browser Bridge</h1>
      <p>
        Configure the local Electron bridge. The default bridge URL is
        <code>http://127.0.0.1:45731</code>.
      </p>

      <label for="bridgeUrl">Bridge URL</label>
      <input id="bridgeUrl" type="text" />

      <label for="sessionToken">Session Token</label>
      <input id="sessionToken" type="password" />

      <button id="save" type="button">Save Settings</button>
      <div id="status"></div>
    </main>

    <script src="options.js"></script>
  </body>
</html>
